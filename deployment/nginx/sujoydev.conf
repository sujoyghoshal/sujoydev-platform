upstream sujoydev_api {
    server api:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.sujoydev.app;

    # For Let's Encrypt HTTP-01 challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.sujoydev.app;

    ssl_certificate     /etc/letsencrypt/live/api.sujoydev.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sujoydev.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass http://sujoydev_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Socket.IO (WebSocket upgrade)
    location /socket.io/ {
        proxy_pass http://sujoydev_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
}
