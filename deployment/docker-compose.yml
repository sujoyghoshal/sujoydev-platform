services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: nurixsoft-api
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    expose:
      - "5000"
    volumes:
      - api-logs:/app/logs
    networks:
      - nurixsoft

  nginx:
    image: nginx:1.27-alpine
    container_name: nurixsoft-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nurixsoft.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - nurixsoft

volumes:
  api-logs:
  certbot-certs:

networks:
  nurixsoft:
    driver: bridge
